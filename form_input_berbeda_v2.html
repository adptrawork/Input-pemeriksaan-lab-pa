<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Hasil PA - V2 (ICD-O & Saran)</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        /* Gaya dasar untuk merapikan tampilan */
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        /* Desain Card Accordion */
        .card {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            margin-bottom: 15px;
            overflow: hidden;
            background-color: #fff;
        }

        .card-header {
            background-color: #f8fafc;
            padding: 15px 20px;
            font-weight: bold;
            color: #1e293b;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
            transition: background-color 0.2s;
        }

        .card-header:hover {
            background-color: #e2e8f0;
        }

        .card-header.active {
            border-bottom: 1px solid #cbd5e1;
            background-color: #eff6ff;
            color: #1d4ed8;
        }

        .card-body {
            padding: 20px;
            display: none;
        }

        .card-body.show {
            display: block;
        }

        /* Desain Form Input */
        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .col {
            flex: 1;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .icdo-box {
            background-color: #fef2f2;
            border: 1px solid #fee2e2;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }

        /* Tombol Aksi */
        .action-buttons {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background-color: #059669;
            color: white;
        }

        .btn-primary:hover {
            background-color: #047857;
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
            text-decoration: none;
            display: flex;
            align-items: center;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Universal Navigation Header -->
        <div class="nav-container" style="background-color: #1e293b; padding: 12px 20px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <span style="color: #94a3b8; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em;">Standar (V1):</span>
            <a href="form_input_berbeda.html" style="color: #60a5fa; text-decoration: none; font-size: 14px; font-weight: 500; padding: 5px 10px; border-radius: 4px;">Berbeda</a>
            <a href="form_input_sama.html" style="color: #60a5fa; text-decoration: none; font-size: 14px; font-weight: 500; padding: 5px 10px; border-radius: 4px;">Sama (Grouped)</a>
            <div style="width: 1px; height: 16px; background-color: #475569; margin: 0 5px;"></div>
            <span style="color: #94a3b8; font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em;">ICD-O (V2):</span>
            <a href="form_input_berbeda_v2.html" style="background-color: rgba(251, 191, 36, 0.2); color: #fbbf24; text-decoration: none; font-size: 14px; font-weight: bold; padding: 5px 10px; border-radius: 4px;">V2 Berbeda</a>
            <a href="form_input_sama_v2.html" style="color: #fbbf24; text-decoration: none; font-size: 14px; font-weight: 500; padding: 5px 10px; border-radius: 4px;">V2 Sama</a>
        </div>
        <div class="header-title">Input Hasil PA - V2 (Penambahan ICD-O & Saran)</div>

        <!-- Sample 1 -->
        <div class="card">
            <div class="card-header active" onclick="toggleCard('body1', this)">
                <span>I. Biopsi esofagus, gaster, colon 1-2 botol</span>
                <span class="icon">▼</span>
            </div>
            <div class="card-body show" id="body1">
                <div class="row">
                    <div class="form-group col">
                        <label>Dokter Tujuan</label>
                        <input type="text" class="form-control" name="dokter_tujuan[0]" value="dr. Betty Marlina Sinaga">
                    </div>
                    <div class="form-group col">
                        <label>Dokter Konsul</label>
                        <input type="text" class="form-control" name="dokter_konsul[0]" value="dr. Udin">
                    </div>
                </div>
                <div class="form-group">
                    <label>Lokasi Jaringan</label>
                    <input type="text" class="form-control" name="lokasi[0]" value="Esofagus">
                </div>
                <div class="form-group">
                    <label>Makroskopis</label>
                    <textarea class="form-control" name="makroskopis[0]">Diterima 2 keping jaringan, ukuran masing-masing 0,3 cm and 0,4 cm, berwarna putih keabuan, konsistensi kenyal. Semua dicetak dalam 1 blok.</textarea>
                </div>
                <div class="form-group">
                    <label>Mikroskopis</label>
                    <textarea class="form-control" name="mikroskopis[0]">Sediaan biopsi menunjukkan fragmen mukosa esofagus berlapis epitel skuamosa yang mengalami hiperplasia sel basal dan pemanjangan papila lamina propria. Tampak sebukan sel radang limfosit dan neutrofil intraepitelial. Tidak tampak sel ganas.</textarea>
                </div>
                <div class="form-group">
                    <label>Kesimpulan</label>
                    <textarea class="form-control" name="kesimpulan[0]">Esofagitis refluks kronis eksaserbasi akut.</textarea>
                </div>
                <div class="form-group icdo-box">
                    <label>ICD-O Code</label>
                    <input type="text" class="form-control" name="icdo[0]" placeholder="Contoh: 8010/3 (Opsional untuk kasus non-tumor)">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Saran / Anjuran Dokter</label>
                    <textarea class="form-control" name="saran[0]" placeholder="Tuliskan saran medis yang terpisah dari kesimpulan...">Korelasi klinis dan endoskopi lebih lanjut.</textarea>
                </div>
            </div>
        </div>

        <!-- Sample 2 -->
        <div class="card">
            <div class="card-header" onclick="toggleCard('body2', this)">
                <span>II. Jaringan sedang 5 - 10 cm (5 - 10 cc)</span>
                <span class="icon">►</span>
            </div>
            <div class="card-body" id="body2">
                <div class="row">
                    <div class="form-group col">
                        <label>Dokter Tujuan</label>
                        <input type="text" class="form-control" name="dokter_tujuan[1]" value="dr. Betty Marlina Sinaga">
                    </div>
                    <div class="form-group col">
                        <label>Dokter Konsul</label>
                        <input type="text" class="form-control" name="dokter_konsul[1]" value="dr. Udin">
                    </div>
                </div>
                <div class="form-group">
                    <label>Lokasi Jaringan</label>
                    <input type="text" class="form-control" name="lokasi[1]" value="Payudara Kanan">
                </div>
                <div class="form-group">
                    <label>Makroskopis</label>
                    <textarea class="form-control" name="makroskopis[1]">Diterima 1 buah jaringan berbenjol tak beraturan ukuran 4 x 3 x 2 cm. Pada pembelahan tampak penampang padat berwarna putih kecoklatan, kenyal.</textarea>
                </div>
                <div class="form-group">
                    <label>Mikroskopis</label>
                    <textarea class="form-control" name="mikroskopis[1]">Sediaan jaringan payudara menunjukkan proliferasi sel-sel epitel duktus yang tersusun padat, membentuk struktur cribriform dan komedo nekrosis di bagian tengah. Inti sel pleomorfik, hiperkromatik dengan aktivitas mitosis meningkat. Tampak invasi sel tumor ke stroma sekitarnya.</textarea>
                </div>
                <div class="form-group">
                    <label>Kesimpulan</label>
                    <textarea class="form-control" name="kesimpulan[1]">Invasive Ductal Carcinoma, Mammae Dextra.</textarea>
                </div>
                <div class="form-group icdo-box">
                    <label>ICD-O Code</label>
                    <input type="text" class="form-control" name="icdo[1]" value="8500/3" placeholder="Contoh: 8010/3">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Saran / Anjuran Dokter</label>
                    <textarea class="form-control" name="saran[1]" placeholder="Tuliskan saran medis...">Disarankan pemeriksaan Imunohistokimia (ER, PR, HER2, Ki-67) untuk penentuan terapi lanjutan.</textarea>
                </div>
            </div>
        </div>

        <!-- Sample 3 -->
        <div class="card">
            <div class="card-header" onclick="toggleCard('body3', this)">
                <span>III. Jaringan kecil < 5 cm (< 5 cc)</span>
                <span class="icon">►</span>
            </div>
            <div class="card-body" id="body3">
                <div class="row">
                    <div class="form-group col">
                        <label>Dokter Tujuan</label>
                        <input type="text" class="form-control" name="dokter_tujuan[2]" value="dr. Betty Marlina Sinaga">
                    </div>
                    <div class="form-group col">
                        <label>Dokter Konsul</label>
                        <input type="text" class="form-control" name="dokter_konsul[2]" value="dr. Udin">
                    </div>
                </div>
                <div class="form-group">
                    <label>Lokasi Jaringan</label>
                    <input type="text" class="form-control" name="lokasi[2]" value="KGB Leher">
                </div>
                <div class="form-group">
                    <label>Makroskopis</label>
                    <textarea class="form-control" name="makroskopis[2]">Diterima 3 buah nodul jaringan, ukuran terbesar 1,5 cm, terkecil 0,5 cm, penampang kecoklatan.</textarea>
                </div>
                <div class="form-group">
                    <label>Mikroskopis</label>
                    <textarea class="form-control" name="mikroskopis[2]">Struktur kelenjar getah bening masih intak. Tampak folikel-folikel limfoid reaktif dengan sentrum germinativum yang melebar. Tampak sebukan sel makrofag. Tidak tampak metastasis sel tumor.</textarea>
                </div>
                <div class="form-group">
                    <label>Kesimpulan</label>
                    <textarea class="form-control" name="kesimpulan[2]">Limfadenitis reaktif kronis.</textarea>
                </div>
                <div class="form-group icdo-box">
                    <label>ICD-O Code</label>
                    <input type="text" class="form-control" name="icdo[2]" placeholder="Contoh: 8010/3">
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label>Saran / Anjuran Dokter</label>
                    <textarea class="form-control" name="saran[2]" placeholder="Tuliskan saran medis...">Pemantauan klinis.</textarea>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-secondary">Batal</button>
            <a href="hasil_cetak_berbeda_v2.html" class="btn btn-secondary">Preview Cetak V2</a>
            <button class="btn btn-primary" onclick="alert('Data V2 Berhasil Disimpan!')">Simpan</button>
        </div>
    </div>

    <script>
        function toggleCard(bodyId, headerElement) {
            var bodyElement = document.getElementById(bodyId);
            var iconElement = headerElement.querySelector('.icon');

            if (bodyElement.classList.contains('show')) {
                bodyElement.classList.remove('show');
                headerElement.classList.remove('active');
                iconElement.innerText = '►';
            } else {
                bodyElement.classList.add('show');
                headerElement.classList.add('active');
                iconElement.innerText = '▼';
            }
        }
    </script>
</body>

</html>
