<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Hasil Patologi Anatomi</title>
    <style>
        /* Gaya dasar untuk merapikan tampilan */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        /* Desain Card Accordion */
        .card {
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            margin-bottom: 15px;
            overflow: hidden;
            background-color: #fff;
        }

        .card-header {
            background-color: #f8fafc;
            padding: 15px 20px;
            font-weight: bold;
            color: #1e293b;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid transparent;
            transition: background-color 0.2s;
        }

        .card-header:hover {
            background-color: #e2e8f0;
        }

        .card-header.active {
            border-bottom: 1px solid #cbd5e1;
            background-color: #eff6ff;
            color: #1d4ed8;
        }

        .card-body {
            padding: 20px;
            display: none;
        }

        .card-body.show {
            display: block;
        }

        /* Desain Form Input */
        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .col {
            flex: 1;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
            background-color: #f8fafc;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        /* Tampilan Khusus Fitur Link/Tautkan Hasil */
        .link-control-box {
            background-color: #fffbeb;
            border: 1px solid #fde68a;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .link-control-box select {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #d1d5db;
        }

        .linked-alert {
            display: none;
            /* Disembunyikan secara default */
            background-color: #eff6ff;
            border: 1px dashed #3b82f6;
            color: #1e40af;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            margin-bottom: 15px;
        }

        /* Tombol Aksi */
        .action-buttons {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background-color: #059669;
            color: white;
        }

        .btn-primary:hover {
            background-color: #047857;
        }

        .btn-secondary {
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
        }
    </style>
</head>

<body>



    <div class="container">
        <!-- Header Navigasi -->
        <div style="background-color: #1e293b; padding: 10px 20px; margin-bottom: 20px; border-radius: 8px;">
            <a href="form_input_berbeda.html"
                style="color: #60a5fa; text-decoration: none; font-weight: bold; margin-right: 20px;">← Input
                Berbeda</a>
            <a href="form_input_sama.html" style="color: #94a3b8; text-decoration: none;">Input Sama →</a>
        </div>
        <div class="header-title">Input Hasil Patologi Anatomi (PA)</div>

        <div class="card">
            <div class="card-header active" onclick="toggleCard('body1', this)">
                <span>1. Jaringan kecil < 5 cm (< 5 cc)</span>
                        <span class="icon">▼</span>
            </div>
            <div class="card-body show" id="body1">

                <div class="row">
                    <div class="form-group col">
                        <label>Dokter Tujuan</label>
                        <input type="text" class="form-control" value="dr. Betty Marlina Sinaga">
                    </div>
                    <div class="form-group col">
                        <label>Dokter Konsul</label>
                        <input type="text" class="form-control" value="dr. Udin ">
                    </div>
                </div>
                <div class="form-group">
                    <div class="form-group col">
                        <label>Lokasi Jaringan</label>
                        <input type="text" class="form-control" placeholder="Contoh: Ovarium Kanan">
                    </div>
                    <label>Makroskopis</label>
                    <textarea class="form-control" placeholder="Ketik deskripsi makroskopis..."></textarea>
                </div>
                <div class="form-group">
                    <label>Mikroskopis</label>
                    <textarea class="form-control" placeholder="Ketik deskripsi mikroskopis..."></textarea>
                </div>
                <div class="form-group">
                    <label>Kesimpulan</label>
                    <textarea class="form-control" placeholder="Ketik kesimpulan atau diagnosis akhir..."></textarea>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header" onclick="toggleCard('body2', this)">
                <span>2. Jaringan sedang 5 - 10 cm (5 - 10 cc)</span>
                <span class="icon">►</span>
            </div>
            <div class="card-body show" id="body2">
                <div class="link-control-box">
                    <label>🔗 Samakan Mikroskopis & Kesimpulan dengan:</label>
                    <select onchange="handleLinkTarget(this, 'group3')" name="link_to_specimen_3">
                        <option value="none">-- Ketik Sendiri (Hasil Berbeda) --</option>
                        <option value="1" selected>1. Jaringan kecil < 5 cm (< 5 cc)</option>
                    </select>
                </div>
                <div class="row">
                    <div class="form-group col">
                        <label>Dokter Tujuan</label>
                        <input type="text" class="form-control" value="dr. Betty Marlina Sinaga">
                    </div>
                    <div class="form-group col">
                        <label>Dokter Konsul</label>
                        <input type="text" class="form-control" value="dr. Udin ">
                    </div>
                </div>


                <div class="form-group">
                    <label>Makroskopis (Selalu diisi spesifik)</label>
                    <textarea class="form-control">Diterima 1 buah jaringan berongga...</textarea>
                </div>

                <div id="group3" style="display: none;">
                    <div class="form-group">
                        <label>Mikroskopis</label>
                        <textarea class="form-control"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Kesimpulan</label>
                        <textarea class="form-control"></textarea>
                    </div>
                </div>

                <div id="alert_group3" class="linked-alert" style="display: block;">
                    Hasil Mikroskopis dan Kesimpulan akan disamakan secara otomatis dengan sediaan yang dipilih.
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-secondary">Batal</button>
            <a href="hasil_cetak_berbeda.html" class="btn btn-secondary">Cetak Hasil</a>
            <button class="btn btn-primary">Simpan</button>
        </div>
    </div>

    <script>
        // Fungsi untuk melipat/membuka Card
        function toggleCard(bodyId, headerElement) {
            var bodyElement = document.getElementById(bodyId);
            var iconElement = headerElement.querySelector('.icon');

            if (bodyElement.classList.contains('show')) {
                bodyElement.classList.remove('show');
                headerElement.classList.remove('active');
                iconElement.innerText = '►';
            } else {
                bodyElement.classList.add('show');
                headerElement.classList.add('active');
                iconElement.innerText = '▼';
            }
        }

        // Fungsi untuk menyembunyikan form Mikro&Kesimpulan jika dilink
        function handleLinkTarget(selectElement, targetGroupId) {
            var targetGroup = document.getElementById(targetGroupId);
            var alertBox = document.getElementById('alert_' + targetGroupId);

            if (selectElement.value !== "none") {
                // Sembunyikan form ketik, munculkan info
                targetGroup.style.display = "none";
                alertBox.style.display = "block";
            } else {
                // Kembalikan form ketik, sembunyikan info
                targetGroup.style.display = "block";
                alertBox.style.display = "none";
            }
        }
    </script>
</body>

</html>
